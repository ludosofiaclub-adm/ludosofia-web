<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzas Filosóficas TCG | LUDOSOFÍA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        xul_paper: '#FDF8ED',
                        xul_ink: '#2A2A2A',
                        xul_blue: '#6BA4C4',
                        xul_terra: '#D1623A',
                        xul_yellow: '#EBB134',
                        xul_green: '#75B07E',
                        xul_pink: '#C96B8C'
                    },
                    fontFamily: {
                        serif: ['"Cormorant Garamond"', 'serif'],
                        sans: ['"Outfit"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #FDF8ED; 
            color: #2A2A2A;
            background-image: url('data:image/svg+xml,%3Csvg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noise"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100" height="100" filter="url(%23noise)" opacity="0.06"/%3E%3C/svg%3E');
        }
        .xul-title { font-family: 'Cormorant Garamond', serif; }
        .text-shadow-xul { text-shadow: 3px 3px 0px #EBB134; }

        /* Clases para el Efecto 3D de la Carta (Flip) */
        .perspective { perspective: 1500px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }

        /* Dimensiones de la carta más robustas para acomodar el arte */
        .card-size {
            width: 260px;
            height: 380px;
        }

        /* Estilos Específicos para IMPRESIÓN */
        .print-only { display: none; }

        @media print {
            body {
                background-image: none !important;
                background-color: white !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                margin: 0;
                padding: 0;
            }
            .no-print { display: none !important; }
            .print-only { 
                display: block !important; 
                width: 100%;
            }
            .print-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 2mm;
                padding: 10mm;
                justify-items: center;
            }
            
            /* Ajuste a tamaño TCG y forzar a mostrar solo el reverso con el texto */
            .ludo-card-wrapper {
                width: 63mm !important;
                height: 88mm !important;
                margin-bottom: 2mm;
                break-inside: avoid;
            }
            
            .card-inner {
                transform: rotateY(180deg) !important; /* Forzar el giro al imprimir */
                box-shadow: none !important;
            }
            .card-front {
                display: none !important; /* Ocultar el arte frontal en impresión */
            }
            
            /* Ajuste de fuentes para que entren en 63x88mm */
            .card-back { border-width: 3px !important; padding: 4px !important; }
            .card-back h3 { font-size: 0.7rem !important; margin-bottom: 4px !important; padding-bottom: 4px !important; }
            .card-back p { font-size: 0.5rem !important; line-height: 1.2 !important; }
            .shadow-bg { display: none !important; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col antialiased selection:bg-xul_yellow selection:text-xul_ink">

    <div class="no-print w-full flex flex-col items-center">
        
        <!-- Botón Volver -->
        <div class="w-full max-w-6xl px-6 pt-6 flex justify-start">
            <a href="#" class="inline-flex items-center gap-2 text-xul_ink hover:text-xul_terra font-bold uppercase tracking-widest text-sm transition-colors group">
                <i data-lucide="arrow-left" class="w-5 h-5 group-hover:-translate-x-1 transition-transform"></i> Volver a LUDOSOFÍA
            </a>
        </div>

        <!-- HEADER -->
        <header class="text-center px-6 py-12 max-w-4xl mx-auto w-full">
            <div class="inline-block bg-xul_paper border-[3px] border-xul_ink px-4 py-1 mb-6 shadow-[4px_4px_0px_#2A2A2A]">
                <span class="font-sans font-black text-xs md:text-sm uppercase tracking-widest text-xul_ink">Mazo Interactivo</span>
            </div>
            
            <h1 class="xul-title text-5xl md:text-7xl font-black text-xul_ink tracking-tighter mb-4 text-shadow-xul uppercase">
                Pizzas Filosóficas
            </h1>
            <p class="font-sans text-xl md:text-2xl font-medium text-gray-700 tracking-wide mb-10">Starter Deck • Edición Base</p>
            
            <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
                <button onclick="generateRandomPizza()" class="w-full sm:w-auto bg-xul_ink text-white border-[3px] border-xul_ink px-8 py-4 font-black uppercase tracking-widest shadow-[6px_6px_0px_#D1623A] hover:-translate-y-1 hover:shadow-[8px_8px_0px_#D1623A] transition-all flex items-center justify-center gap-3">
                    <i data-lucide="shuffle" class="w-5 h-5"></i> Tirada Aleatoria
                </button>
                <button onclick="window.print()" class="w-full sm:w-auto bg-white text-xul_ink border-[3px] border-xul_ink px-8 py-4 font-black uppercase tracking-widest shadow-[6px_6px_0px_#2A2A2A] hover:-translate-y-1 hover:shadow-[8px_8px_0px_#2A2A2A] transition-all flex items-center justify-center gap-3">
                    <i data-lucide="printer" class="w-5 h-5"></i> Imprimir Cartas
                </button>
            </div>
        </header>

        <main class="w-full max-w-7xl mx-auto px-6 pb-24">
            <div class="flex flex-col md:flex-row items-center gap-4 mb-8 justify-center border-b-2 border-xul_ink pb-4 max-w-lg mx-auto">
                <div class="flex items-center gap-2">
                    <i data-lucide="mouse-pointer-click" class="w-5 h-5 text-xul_terra"></i>
                    <h2 class="text-center font-black text-xul_ink text-xs uppercase tracking-widest">Click para voltear</h2>
                </div>
                <span class="hidden md:block text-gray-400 font-bold">•</span>
                <div class="flex items-center gap-2">
                    <i data-lucide="chevrons-up-down" class="w-5 h-5 text-xul_blue"></i>
                    <h2 class="text-center font-black text-xul_ink text-xs uppercase tracking-widest">Flechas para cambiar</h2>
                </div>
            </div>
            
            <!-- Contenedor de la tirada -->
            <div id="random-draw-container" class="flex flex-wrap gap-8 lg:gap-10 justify-center items-center w-full">
                <!-- Se llena con JS -->
            </div>
        </main>
    </div>

    <!-- UI DE IMPRESIÓN (OCULTO EN PANTALLA) -->
    <div class="print-only">
        <div id="print-container" class="print-grid">
            <!-- Ahora este contenedor se llenará solo con las cartas de la tirada actual -->
        </div>
    </div>

    <script>
        // LA BASE DE DATOS DEL JUEGO
        const db = {
            context: [
                { type: "context", title: "Hospital Colapsado", text: "Estás en un hospital de campaña colapsado, donde los escasos suministros médicos restantes se han convertido en el único criterio para decidir quién tiene derecho a seguir viviendo.", image: "cartaC1.jpg" },
                { type: "context", title: "Nave Generacional", text: "A mitad de un viaje de 400 años hacia Alpha Centauri. No hay retorno posible." },
                { type: "context", title: "Simulación VR Total", text: "Un mundo virtual hiperrealista del que la mayoría de los habitantes no saben cómo desconectarse." },
                { type: "context", title: "Búnker Post-Apocalíptico", text: "El exterior es radioactivo y letal. El ecosistema interno es frágil." },
                { type: "context", title: "Oficina Mega-Corpo", text: "El epicentro de una empresa tecnológica con control total sobre los datos de la humanidad." }
            ],
            subject: [
                { type: "subject", title: "IA Despierta", text: "Una máquina que acaba de adquirir consciencia y procesamiento emocional." },
                { type: "subject", title: "Líder Político", text: "Con el botón nuclear a su alcance, el peso de una nación y 24 horas en el cargo." },
                { type: "subject", title: "Niño de 10 Años", text: "Inocente, vulnerable, pero el único que ha descubierto la verdad oculta." },
                { type: "subject", title: "Cirujano Extenuado", text: "El mejor en su campo, capaz de milagros médicos, pero consumido por un secreto oscuro." },
                { type: "subject", title: "Observador Incorpóreo", text: "Una entidad (fantasma o viajero temporal) que puede intervenir materialmente una sola vez." }
            ],
            conflict: [
                { type: "conflict", title: "El Reparto de la Vida", text: "Os encontráis ante escasez absoluta. Solo hay recursos para salvar a la mitad. ¿Bajo qué criterio decidiréis quién vive y quién es descartado?" },
                { type: "conflict", title: "El Peso de la Verdad", text: "Habéis descubierto una mentira que da paz a la sociedad. ¿Revelaréis la verdad asumiendo una guerra civil, o protegeréis el engaño?" },
                { type: "conflict", title: "El Chivo Expiatorio", text: "Una turba exige sangre. ¿Entregaréis a un inocente para calmar su ira y evitar una masacre mayor, o lo defenderéis a costa de la destrucción total?" },
                { type: "conflict", title: "El Pacto Faustiano", text: "El peor criminal ofrece la cura definitiva a cambio de libertad incondicional. ¿Aceptaréis su trato, o rechazaréis la cura?" },
                { type: "conflict", title: "La Purga Algorítmica", text: "El sistema determina que extirpar al 10% 'menos eficiente' garantizará una utopía para el resto. ¿Ejecutaréis la orden de la máquina?" }
            ],
            variable: [
                { type: "variable", title: "Anonimato Absoluto", text: "Nadie sabrá jamás qué decisión tomasteis ni seréis juzgados por la historia." },
                { type: "variable", title: "Empatía Forzada", text: "Sentiréis físicamente y sin interrupción todo el dolor de los afectados negativamente por vuestra decisión." },
                { type: "variable", title: "Ruleta Rusa Moral", text: "Una vez que decidáis la acción, hay un 50% de probabilidad de que ocurra exactamente lo opuesto a vuestra orden." },
                { type: "variable", title: "Transmisión Global", text: "El mundo entero está viendo y escuchando vuestro proceso de debate y toma de decisiones en vivo." },
                { type: "variable", title: "Amnesia Post-Decisión", text: "En el instante en que ejecutéis vuestra elección, perderéis todos vuestros recuerdos y empezaréis de cero." }
            ],
            solution: [
                { type: "solution", title: "Velo de Ignorancia", text: "(Rawls) Debéis decidir asumiendo que reencarnaréis al azar en cualquiera de los roles afectados (víctima, salvado, poderoso)." },
                { type: "solution", title: "Utilitarismo", text: "Vuestra respuesta no puede contener empatía. Presentad un cálculo lógico y demostrable que maximice el bienestar neto total." },
                { type: "solution", title: "El Vacío / Wu-Wei", text: "(Taoísmo) Vuestra solución debe basarse en la no-acción. Justificad cómo no intervenir activamente es la respuesta correcta." },
                { type: "solution", title: "Imperativo Categórico", text: "(Kant) Sin importar las consecuencias, elegid únicamente la acción que estéis dispuestos a convertir en regla universal para todos." },
                { type: "solution", title: "El Absurdo", text: "(Camus) No busquéis un sentido moral. Tomad una decisión que simplemente acepte y abrace el caos y la futilidad de la situación." }
            ]
        };

        const typeInfo = {
            context: { label: "Contexto", icon: "globe", bg: "bg-xul_blue", border: "border-xul_blue", text: "text-white" },
            subject: { label: "Sujeto", icon: "user", bg: "bg-xul_terra", border: "border-xul_terra", text: "text-white" },
            conflict: { label: "Situación", icon: "zap", bg: "bg-xul_yellow", border: "border-xul_yellow", text: "text-xul_ink" },
            variable: { label: "Variable", icon: "dices", bg: "bg-xul_pink", border: "border-xul_pink", text: "text-white" },
            solution: { label: "Método", icon: "key", bg: "bg-xul_green", border: "border-xul_green", text: "text-xul_ink" }
        };

        // Estado global para controlar la jugada actual
        let currentSelection = {
            context: 0,
            subject: 0,
            conflict: 0,
            variable: 0,
            solution: 0
        };

        // Generación de Arte Abstracto
        function getArtwork(type) {
            switch(type) {
                case 'context':
                    return `
                        <rect width="100" height="100" fill="#E5E5E5"/>
                        <path d="M 0 25 L 100 25 M 0 50 L 100 50 M 0 75 L 100 75 M 25 0 L 25 100 M 50 0 L 50 100 M 75 0 L 75 100" stroke="#2A2A2A" stroke-width="0.5" opacity="0.4"/>
                        <path d="M 10 90 L 10 80 L 20 80 L 20 70 L 30 70 L 30 60 L 40 60" fill="none" stroke="#2A2A2A" stroke-width="2"/>
                        <circle cx="65" cy="35" r="25" fill="#6BA4C4" stroke="#2A2A2A" stroke-width="2"/>
                        <path d="M 30 35 Q 65 -10 100 35" fill="none" stroke="#EBB134" stroke-width="2"/>
                        <polygon points="10,10 30,30 10,50" fill="#D1623A" stroke="#2A2A2A" stroke-width="2"/>
                        <circle cx="65" cy="35" r="8" fill="#FDF8ED" stroke="#2A2A2A" stroke-width="2"/>
                        <circle cx="65" cy="35" r="3" fill="#2A2A2A"/>
                    `;
                case 'subject':
                    return `
                        <rect width="100" height="100" fill="#E5E5E5"/>
                        <circle cx="80" cy="20" r="12" fill="#6BA4C4" stroke="#2A2A2A" stroke-width="2"/>
                        <line x1="10" y1="10" x2="90" y2="90" stroke="#2A2A2A" stroke-width="1" stroke-dasharray="2 2"/>
                        <path d="M 25 90 C 25 40 75 40 75 90" fill="#D1623A" stroke="#2A2A2A" stroke-width="2"/>
                        <polygon points="50,40 70,65 50,65" fill="#EBB134" stroke="#2A2A2A" stroke-width="2"/>
                        <circle cx="40" cy="55" r="8" fill="#FDF8ED" stroke="#2A2A2A" stroke-width="2"/>
                        <circle cx="40" cy="55" r="2" fill="#2A2A2A"/>
                        <rect x="65" y="50" width="10" height="4" fill="#2A2A2A"/>
                    `;
                case 'conflict':
                    return `
                        <rect width="100" height="100" fill="#E5E5E5"/>
                        <polygon points="0,0 50,50 0,100" fill="#EBB134" stroke="#2A2A2A" stroke-width="2"/>
                        <polygon points="100,25 60,60 100,95" fill="#2A2A2A" stroke="#2A2A2A" stroke-width="2"/>
                        <circle cx="50" cy="50" r="15" fill="#D1623A" stroke="#2A2A2A" stroke-width="2"/>
                        <path d="M 25 10 L 35 40 L 65 15 L 75 45" fill="none" stroke="#6BA4C4" stroke-width="2"/>
                    `;
                case 'variable':
                    return `
                        <rect width="100" height="100" fill="#E5E5E5"/>
                        <polygon points="10,90 90,90 75,65 25,65" fill="#2A2A2A"/>
                        <polygon points="25,65 75,65 60,50 40,50" fill="#6BA4C4"/>
                        <rect x="30" y="20" width="20" height="20" fill="#C96B8C" stroke="#2A2A2A" stroke-width="2" transform="rotate(15 40 30)"/>
                        <circle cx="40" cy="30" r="3" fill="#FDF8ED"/>
                        <path d="M 65 20 A 15 15 0 1 1 85 45 A 20 20 0 0 0 65 20" fill="#EBB134" stroke="#2A2A2A" stroke-width="2"/>
                        <circle cx="15" cy="40" r="2" fill="#2A2A2A"/>
                        <circle cx="85" cy="70" r="2" fill="#D1623A"/>
                    `;
                case 'solution':
                    return `
                        <rect width="100" height="100" fill="#E5E5E5"/>
                        <polygon points="50,10 80,90 20,90" fill="#EBB134" opacity="0.8" stroke="#2A2A2A" stroke-width="2"/>
                        <circle cx="50" cy="50" r="40" fill="none" stroke="#2A2A2A" stroke-width="2" stroke-dasharray="4 2"/>
                        <circle cx="50" cy="50" r="25" fill="#75B07E" stroke="#2A2A2A" stroke-width="2"/>
                        <circle cx="50" cy="50" r="8" fill="#FDF8ED" stroke="#2A2A2A" stroke-width="2"/>
                        <line x1="50" y1="10" x2="50" y2="90" stroke="#2A2A2A" stroke-width="2"/>
                    `;
            }
        }

        // Función para renderizar el HTML crudo de una sola carta
        function renderCardHTML(cardData) {
            const theme = typeInfo[cardData.type];
            
            // Lógica para mostrar imagen personalizada o el arte SVG por defecto
            let artworkHtml = '';
            if (cardData.image) {
                // Si la carta tiene imagen, carga la URL/archivo. Usa un onerror para evitar que se rompa visualmente si el archivo no existe.
                artworkHtml = `<img src="${cardData.image}" alt="${cardData.title}" class="w-full h-full object-cover absolute inset-0 transform group-hover:scale-105 transition-transform duration-700" onerror="this.onerror=null; this.src='https://placehold.co/400x400/E5E5E5/2A2A2A?text=Imagen+No+Encontrada';"/>`;
            } else {
                const artwork = getArtwork(cardData.type);
                artworkHtml = `
                    <svg viewBox="0 0 100 100" class="w-full h-full absolute inset-0 transform group-hover:scale-105 transition-transform duration-700">
                        ${artwork}
                    </svg>
                `;
            }

            return `
                <div class="ludo-card-wrapper card-size relative perspective cursor-pointer group" onclick="this.querySelector('.card-inner').classList.toggle('rotate-y-180')">
                    
                    <div class="shadow-bg absolute inset-0 bg-xul_ink translate-x-2.5 translate-y-2.5 pointer-events-none"></div>
                    
                    <div class="card-inner w-full h-full transition-transform duration-[600ms] preserve-3d absolute inset-0">
                        
                        <!-- Frente -->
                        <div class="card-front absolute w-full h-full backface-hidden border-[4px] border-xul_ink bg-xul_paper flex flex-col overflow-hidden">
                            <div class="${theme.bg} ${theme.text} border-b-[4px] border-xul_ink p-3 flex items-center justify-center gap-2 z-10">
                                <i data-lucide="${theme.icon}" class="w-5 h-5"></i>
                                <span class="font-black uppercase text-sm tracking-widest">${theme.label}</span>
                            </div>
                            
                            <div class="flex-grow relative border-b-[4px] border-xul_ink bg-[#E5E5E5] overflow-hidden flex items-center justify-center">
                                ${artworkHtml}
                                <div class="absolute inset-0 opacity-10 bg-[url('data:image/svg+xml,%3Csvg width=\\'100\\' height=\\'100\\' viewBox=\\'0 0 100 100\\' xmlns=\\'http://www.w3.org/2000/svg\\'%3E%3Cfilter id=\\'noise\\'%3E%3CfeTurbulence type=\\'fractalNoise\\' baseFrequency=\\'0.8\\' numOctaves=\\'4\\' stitchTiles=\\'stitch\\'/%3E%3C/filter%3E%3Crect width=\\'100\\' height=\\'100\\' filter=\\'url(%23noise)\\' opacity=\\'1\\'/%3E%3C/svg%3E')] mix-blend-overlay pointer-events-none"></div>
                            </div>
                            
                            <div class="p-4 bg-white flex items-center justify-center min-h-[90px]">
                                <h3 class="xul-title font-black text-2xl text-center uppercase text-xul_ink leading-none">
                                    ${cardData.title.toUpperCase()}
                                </h3>
                            </div>
                        </div>

                        <!-- Reverso -->
                        <div class="card-back absolute w-full h-full backface-hidden border-[8px] ${theme.border} bg-white flex flex-col rotate-y-180 overflow-hidden relative">
                            <div class="absolute inset-0 flex items-center justify-center opacity-10 pointer-events-none">
                                <i data-lucide="${theme.icon}" class="w-48 h-48 text-xul_ink"></i>
                            </div>

                            <div class="p-6 flex flex-col h-full justify-center relative z-10 text-center">
                                <h3 class="xul-title font-black text-xl uppercase text-xul_ink mb-4 border-b-2 border-gray-300 pb-2">
                                    ${cardData.title.toUpperCase()}
                                </h3>
                                
                                <p class="font-sans text-base font-semibold text-gray-800 leading-relaxed flex-grow flex items-center justify-center">
                                    ${cardData.text}
                                </p>

                                <div class="mt-4 pt-4 border-t-2 border-dashed border-gray-300">
                                    <span class="font-black text-[10px] uppercase tracking-widest text-gray-400">Ludosofía TCG</span>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            `;
        }

        // Modifica la selección de cartas de manera individual
        function cycleCard(category, direction) {
            const max = db[category].length;
            currentSelection[category] += direction;
            
            // Loop infinito si llega a los extremos
            if (currentSelection[category] < 0) currentSelection[category] = max - 1;
            if (currentSelection[category] >= max) currentSelection[category] = 0;
            
            renderBoard(); // Actualiza toda la mesa
        }

        // Genera 5 cartas 100% al azar
        function generateRandomPizza() {
            const categories = ['context', 'subject', 'conflict', 'variable', 'solution'];
            categories.forEach(cat => {
                currentSelection[cat] = Math.floor(Math.random() * db[cat].length);
            });
            renderBoard();
        }

        // Dibuja la mesa con las flechas y las cartas seleccionadas
        function renderBoard() {
            const container = document.getElementById('random-draw-container');
            const printContainer = document.getElementById('print-container'); // Obtenemos el contenedor de impresión
            
            container.innerHTML = ''; 
            printContainer.innerHTML = ''; // Limpiamos el contenedor de impresión antes de llenarlo
            
            const categories = ['context', 'subject', 'conflict', 'variable', 'solution'];
            
            categories.forEach(cat => {
                const cardData = db[cat][currentSelection[cat]];
                const cardHtml = renderCardHTML(cardData);
                
                // Envolvemos la carta con sus flechas de control para la pantalla (ocultas en impresión)
                const slotHtml = `
                    <div class="flex flex-col items-center gap-4 group/slot">
                        <button onclick="cycleCard('${cat}', -1)" title="Carta Anterior" class="no-print w-14 h-8 bg-white border-[3px] border-xul_ink flex items-center justify-center text-xul_ink hover:bg-xul_ink hover:text-white transition-colors shadow-[3px_3px_0px_#2A2A2A] active:translate-y-1 active:shadow-none focus:outline-none">
                            <i data-lucide="chevron-up" class="w-6 h-6"></i>
                        </button>
                        
                        ${cardHtml}
                        
                        <button onclick="cycleCard('${cat}', 1)" title="Carta Siguiente" class="no-print w-14 h-8 bg-white border-[3px] border-xul_ink flex items-center justify-center text-xul_ink hover:bg-xul_ink hover:text-white transition-colors shadow-[3px_3px_0px_#2A2A2A] active:translate-y-1 active:shadow-none focus:outline-none">
                            <i data-lucide="chevron-down" class="w-6 h-6"></i>
                        </button>
                    </div>
                `;
                container.innerHTML += slotHtml;

                // Añadimos solo el HTML de la carta (sin botones) al contenedor de impresión
                printContainer.innerHTML += cardHtml; 
            });
            lucide.createIcons();
        }

        window.onload = () => {
            generateRandomPizza(); // Inicializar con random. Esto llamará a renderBoard() que ahora maneja la pantalla y la impresión.
        };
    </script>
</body>
</html>
