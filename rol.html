<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Roles | LUDOSOFÍA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBbvpUaTAyeRGT0yxY-YswQab5dRalx5uc",
            authDomain: "ludosofia-1cdc7.firebaseapp.com",
            projectId: "ludosofia-1cdc7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Capturamos el nombre de este archivo para la redirección inteligente si el token expira o no existe
        const rutaActual = window.location.pathname.split('/').pop() || 'index.html';

        // Escuchador asíncrono obligatorio para determinar el estado real del usuario
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                // Si NO está logueado, guardamos la ubicación en la memoria local y redirigimos al login
                localStorage.setItem('destino_post_login', rutaActual);
                window.location.replace('login.html'); 
            } else {
                // SI está logueado, procedemos a verificar su documento de perfil en Firestore
                try {
                    let docRef;
                    if (typeof __app_id !== 'undefined') {
                        docRef = doc(db, 'artifacts', __app_id, 'users', user.uid, 'usuarios', 'perfil'); 
                    } else {
                        docRef = doc(db, "usuarios", user.uid);
                    }

                    const docSnap = await getDoc(docRef);
                    let rolUsuario = 'socio'; // Rol base por defecto

                    if (docSnap.exists()) {
                        rolUsuario = docSnap.data().rol || 'socio';
                    }
                    
                    // Almacenamos el rol en LocalStorage para consultas rápidas en elementos de la interfaz
                    localStorage.setItem('rol_usuario', rolUsuario);

                    // Una vez todo verificado, ocultamos el mensaje de carga y revelamos el contenido real
                    document.getElementById('pantalla-carga').classList.add('hidden');
                    document.getElementById('contenido-pagina').classList.remove('hidden');
                    
                    // Vinculamos los datos obtenidos a las etiquetas del contenedor protegido
                    if (document.getElementById('user-email')) document.getElementById('user-email').innerText = user.email;
                    if (document.getElementById('user-role')) document.getElementById('user-role').innerText = rolUsuario;

                } catch (error) {
                    console.error("Error al validar el rol del usuario en la base de datos:", error);
                }
            }
        });
    </script>
    <style>
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #FDF8ED; 
            color: #2A2A2A;
        }
        .xul-title { font-family: 'Cormorant Garamond', serif; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col justify-center items-center p-4">

    <div id="pantalla-carga" class="text-base font-black uppercase tracking-widest text-gray-500 flex flex-col items-center gap-4">
        <svg class="animate-spin h-8 w-8 text-xul_terra" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        Verificando credenciales del Club...
    </div>

    <main id="contenido-pagina" class="hidden w-full max-w-md bg-white border-[3px] border-[#2A2A2A] p-8 shadow-[12px_12px_0px_#EBB134]">
        <h1 class="xul-title text-4xl font-black uppercase tracking-tight mb-2 text-[#2A2A2A]">Panel de Control</h1>
        <p class="text-xs text-gray-500 font-bold uppercase tracking-wider mb-6">Área de Credenciales</p>
        
        <div class="border-[3px] border-[#2A2A2A] p-4 mb-6 bg-[#FDF8ED] text-sm space-y-3 font-medium">
            <p class="flex justify-between border-b border-gray-300 pb-2">
                <span class="text-gray-500 uppercase tracking-wider text-xs font-bold">Socio:</span> 
                <span id="user-email" class="font-bold text-[#2A2A2A]">Cargando...</span>
            </p>
            <p class="flex justify-between pt-1">
                <span class="text-gray-500 uppercase tracking-wider text-xs font-bold">Rol en Tablero:</span> 
                <span id="user-role" class="uppercase font-black text-xul_terra tracking-widest">Cargando...</span>
            </p>
        </div>

        <a href="index.html" class="block text-center w-full bg-[#EBB134] text-[#2A2A2A] font-black py-4 uppercase tracking-widest border-[3px] border-[#2A2A2A] shadow-[4px_4px_0px_#2A2A2A] hover:translate-y-[-1px] hover:shadow-[5px_5px_0px_#2A2A2A] transition-all">
            Volver al Club
        </a>
    </main>

</body>
</html>
