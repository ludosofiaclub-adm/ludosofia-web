<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juegos de rola | LUDOSOFÍA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        xul_paper: '#FDF8ED',
                        xul_ink: '#2A2A2A',
                        xul_blue: '#6BA4C4',
                        xul_terra: '#D1623A',
                        xul_yellow: '#EBB134',
                        xul_green: '#75B07E',
                        xul_pink: '#C96B8C',
                        xul_silver: '#C4CAD0',
                        xul_orange: '#E87524'
                    },
                    fontFamily: {
                        serif: ['"Cormorant Garamond"', 'serif'],
                        sans: ['"Outfit"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #FDF8ED; 
            color: #2A2A2A;
            background-image: url('data:image/svg+xml,%3Csvg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noise"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100" height="100" filter="url(%23noise)" opacity="0.06"/%3E%3C/svg%3E');
        }
        .xul-border {
            border: 3px solid #2A2A2A;
            box-shadow: 6px 6px 0px #2A2A2A;
            transition: all 0.2s ease;
        }
        .xul-border:hover {
            transform: translate(-3px, -3px);
            box-shadow: 9px 9px 0px #2A2A2A;
        }
        .xul-title {
            font-family: 'Cormorant Garamond', serif;
        }
        .text-shadow-xul {
            text-shadow: 4px 4px 0px #2A2A2A;
        }

        /* Animación para Socio Fundador */
        @keyframes fundadorFloat {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-3px) rotate(3deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .anim-fundador {
            animation: fundadorFloat 3s infinite ease-in-out;
        }
        /* Animación Modal */
        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-animate {
            animation: modalFadeIn 0.3s ease-out forwards;
        }
    </style>

    <!-- CEREBRO DE FIREBASE - GUARDIÁN DE LA PÁGINA -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBbvpUaTAyeRGT0yxY-YswQab5dRalx5uc",
            authDomain: "ludosofia-1cdc7.firebaseapp.com",
            projectId: "ludosofia-1cdc7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Escuchador de estado de sesión
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                // Si el usuario NO existe (no está logueado), lo mandamos al login
                // window.location.replace('login.html'); 
                console.log("Visitante público viendo la página.");
            } else {
                // El usuario está logueado, se le permite ver la página.
                console.log("Acceso concedido al socio:", user.email);
            }
        });
    </script>
</head><body class="antialiased min-h-screen flex flex-col justify-center items-center p-4">

    <div id="pantalla-carga" class="text-base font-black uppercase tracking-widest text-gray-500 flex flex-col items-center gap-4">
        <svg class="animate-spin h-8 w-8 text-xul_terra" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        Verificando credenciales del Club...
    </div>

    <main id="contenido-pagina" class="hidden w-full max-w-md bg-white border-[3px] border-[#2A2A2A] p-8 shadow-[12px_12px_0px_#EBB134]">
        <h1 class="xul-title text-4xl font-black uppercase tracking-tight mb-2 text-[#2A2A2A]">Panel de Control</h1>
        <p class="text-xs text-gray-500 font-bold uppercase tracking-wider mb-6">Área de Credenciales</p>
        
        <div class="border-[3px] border-[#2A2A2A] p-4 mb-6 bg-[#FDF8ED] text-sm space-y-3 font-medium">
            <p class="flex justify-between border-b border-gray-300 pb-2">
                <span class="text-gray-500 uppercase tracking-wider text-xs font-bold">Socio:</span> 
                <span id="user-email" class="font-bold text-[#2A2A2A]">Cargando...</span>
            </p>
            <p class="flex justify-between pt-1">
                <span class="text-gray-500 uppercase tracking-wider text-xs font-bold">Rol en Tablero:</span> 
                <span id="user-role" class="uppercase font-black text-xul_terra tracking-widest">Cargando...</span>
            </p>
        </div>

        <a href="index.html" class="block text-center w-full bg-[#EBB134] text-[#2A2A2A] font-black py-4 uppercase tracking-widest border-[3px] border-[#2A2A2A] shadow-[4px_4px_0px_#2A2A2A] hover:translate-y-[-1px] hover:shadow-[5px_5px_0px_#2A2A2A] transition-all">
            Volver al Club
        </a>
    </main>

</body>
</html>
